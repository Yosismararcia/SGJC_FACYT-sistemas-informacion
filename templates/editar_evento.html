{% extends "base.html" %}

{% block title %}Editar Evento - SGJC FaCyT{% endblock %}

{% block content %}
<div style="max-width: 650px; margin: 0 auto;">
    <h2>✏️ Modificar Evento Oficial</h2>
    <p><small>Edite los aspectos informativos y la logística del evento seleccionado.</small></p>

    <article>
        <form action="{{ url_for('admin_editar_evento', evento_id=evento.id) }}" method="POST">            
            <!-- Título -->
            <label for="titulo">
                Título de la Actividad / Congreso:
                <input type="text" id="titulo" name="titulo" value="{{ evento.titulo }}" required>
            </label>

            <!-- Tipo de Actividad -->
            <label for="tipo_actividad">
                Tipo de Actividad:
                <select id="tipo_actividad" name="tipo_actividad" required>
                    <option value="Congreso" {% if evento.tipo_actividad == 'Congreso' %}selected{% endif %}>Congreso</option>
                    <option value="Taller" {% if evento.tipo_actividad == 'Taller' %}selected{% endif %}>Taller</option>
                    <option value="Conferencia" {% if evento.tipo_actividad == 'Conferencia' %}selected{% endif %}>Conferencia</option>
                    <option value="Simposio" {% if evento.tipo_actividad == 'Simposio' %}selected{% endif %}>Simposio</option>
                    <option value="Jornada" {% if evento.tipo_actividad == 'Jornada' %}selected{% endif %}>Jornada</option>
                    <option value="Otro" {% if evento.tipo_actividad == 'Otro' %}selected{% endif %}>Otro</option>
                </select>
            </label>

            <!-- Fecha y Horarios -->
            <div class="grid">
                <div>
                    <label for="fecha">
                        Fecha del Evento:
                        <input type="date" id="fecha" name="fecha" value="{{ evento.fecha }}" required>
                    </label>
                </div>
                <div>
                    <label for="hora_inicio">
                        Hora Inicio:
                        <input type="time" id="hora_inicio" name="hora_inicio" value="{{ evento.hora_inicio }}" required>
                    </label>
                </div>
                <div>
                    <label for="hora_fin">
                        Hora Finalización:
                        <input type="time" id="hora_fin" name="hora_fin" value="{{ evento.hora_fin }}" required>
                    </label>
                </div>
            </div>

            <!-- Espacio Físico -->
            <label for="espacio_id">
                Espacio Asignado:
                <select id="espacio_id" name="espacio_id" required>
                    {% for espacio in espacios %}
                        <option value="{{ espacio.id }}" {% if evento.espacio_id == espacio.id %}selected{% endif %}>
                            {{ espacio.nombre }} (Capacidad: {{ espacio.capacidad }})
                        </option>
                    {% endfor %}
                </select>
            </label>

            <!-- Botones de Acción -->
            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                <a href="/admin" role="button" class="secondary outline" style="margin: 0;">Cancelar</a>
                <button type="submit" style="margin: 0; background-color: #059669; border-color: #059669; color: white;">
                    Actualizar Cambios
                </button>
            </div>

        </form>
    </article>
</div>
{% endblock %}
